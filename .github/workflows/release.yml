name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Package release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: runtime/pnpm-lock.yaml

      - name: Build package
        run: scripts/package.sh

      - name: Install pinned dprint CLI
        shell: bash
        run: |
          set -euo pipefail
          dprint_version=$(tr -d '[:space:]' < .dprint-version)
          dprint_prefix="$RUNNER_TEMP/dprint-cli"
          npm install \
            --prefix "$dprint_prefix" \
            --ignore-scripts \
            --no-package-lock \
            --no-save \
            "dprint@$dprint_version"
          printf 'DPRINT_BIN=%s/node_modules/.bin/dprint\n' "$dprint_prefix" >> "$GITHUB_ENV"

      - name: Verify package with dprint CLI
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(dist/releases/*.tar.gz)
          test "${#archives[@]}" -eq 1
          test -f "${archives[0]}.sha256"
          scripts/smoke-dprint-cli.sh "${archives[0]}"

      - name: Upload checksummed artifact
        uses: actions/upload-artifact@v4
        with:
          name: dprint-plugin-oxfmt-release
          path: |
            dist/releases/*.tar.gz
            dist/releases/*.sha256
