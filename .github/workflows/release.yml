name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Package and verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: runtime/pnpm-lock.yaml

      - name: Set up archive tools on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install zip --yes --no-progress

      - name: Build package
        shell: bash
        run: scripts/package.sh

      - name: Install pinned dprint CLI
        shell: bash
        run: |
          set -euo pipefail
          dprint_version=$(tr -d '[:space:]' < .dprint-version)
          runner_temp="$RUNNER_TEMP"
          if command -v cygpath >/dev/null 2>&1; then
            runner_temp=$(cygpath -u "$runner_temp")
          fi
          dprint_prefix="$runner_temp/dprint-cli"
          npm install \
            --prefix "$dprint_prefix" \
            --ignore-scripts \
            --no-package-lock \
            --no-save \
            "dprint@$dprint_version"
          dprint_bin="$dprint_prefix/node_modules/.bin/dprint"
          if [[ ! -f "$dprint_bin" ]]; then
            dprint_bin="$dprint_prefix/node_modules/.bin/dprint.cmd"
          fi
          test -f "$dprint_bin"
          printf 'DPRINT_BIN=%s\n' "$dprint_bin" >> "$GITHUB_ENV"

      - name: Verify package with dprint CLI
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(dist/releases/*.tar.gz)
          test "${#archives[@]}" -eq 1
          test -f "${archives[0]}.sha256"
          scripts/smoke-dprint-cli.sh "${archives[0]}"

      - name: Upload checksummed artifact
        uses: actions/upload-artifact@v4
        with:
          name: dprint-plugin-oxfmt-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/releases/*.tar.gz
            dist/releases/*.sha256
          if-no-files-found: error
