name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Package release artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: runtime/pnpm-lock.yaml

      - name: Build package
        run: scripts/package.sh

      - name: Verify package archive
        shell: bash
        run: |
          set -euo pipefail
          archive=$(find dist/releases -name '*.tar.gz' -print -quit)
          checksum="${archive}.sha256"
          test -n "$archive"
          test -f "$checksum"
          shasum -a 256 --check "$checksum"

          workdir=$(mktemp -d)
          trap 'rm -rf "$workdir"' EXIT
          tar -xzf "$archive" -C "$workdir"
          tar -tzf "$archive" > "$workdir/archive.contents"
          grep -Fx './runtime/dist/worker.js' "$workdir/archive.contents"
          grep -Fx './runtime/dist/protocol.js' "$workdir/archive.contents"
          grep -Fx './runtime/package.json' "$workdir/archive.contents"
          ! grep -Fx './runtime/worker.js' "$workdir/archive.contents"

          node - "$workdir/plugin-manifest.json" <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));
          if (manifest.worker !== "runtime/dist/worker.js") {
            throw new Error(`unexpected worker path: ${manifest.worker}`);
          }
          NODE

          printf '%s\n%s\n' \
            '{"type":"initialize","protocolVersion":1}' \
            '{"type":"shutdown"}' \
            | node "$workdir/runtime/dist/worker.js" \
                > "$workdir/worker.stdout" \
                2> "$workdir/worker.stderr"
          test ! -s "$workdir/worker.stderr"
          node - "$workdir/worker.stdout" <<'NODE'
          const assert = require("node:assert/strict");
          const fs = require("node:fs");
          const messages = fs.readFileSync(process.argv[2], "utf8")
            .trim()
            .split("\n")
            .map((line) => JSON.parse(line));
          assert.equal(messages[0].type, "initialized");
          assert.deepEqual(messages[1], { type: "shutdownComplete" });
          NODE

      - name: Upload checksummed artifact
        uses: actions/upload-artifact@v4
        with:
          name: dprint-plugin-oxfmt-release
          path: |
            dist/releases/*.tar.gz
            dist/releases/*.sha256
